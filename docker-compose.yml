services:
  db:
    container_name: trustvault-db
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:  # ← indented under db:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-.....@#93Gwiternz29#@.......}
      POSTGRES_DB: trustvault_db
      POSTGRES_USER: trustvault_user
    ports:  # ← indented under db:
      - "5433:5432"
    healthcheck:  # ← indented under db:
      test: ["CMD-SHELL", "pg_isready -U trustvault_user -d trustvault_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    container_name: trustvault-redis
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  web:
    container_name: trustvault-web
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "while ! nc -z db 5432; do sleep 1; done &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --worker-class gthread --timeout 120 --max-requests 1000 --preload"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    container_name: trustvault-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=2 --max-tasks-per-child=1000
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    container_name: trustvault-beat
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: