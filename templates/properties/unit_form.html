{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'properties:unit_list' %}" class="text-primary-600">← Back to Units</a>
        <h1 class="text-2xl font-bold mt-2">Manage Unit</h1>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-md border">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="mt-6 w-full bg-primary-600 text-white py-3 rounded-lg font-bold">
                Save Unit Details
            </button>
        </form>
    </div>
</div>
{% endblock %}
