{% extends "base.html" %}
{% block title %}Feedback - RentFlow{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Rate Maintenance Service</h1>
    <div class="card">
        <p class="text-gray-600 mb-4">{{ maintenance_request.title }}</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Rating (1-5)</label>
                <select name="rating" class="form-select">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Average</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Very Poor</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Feedback</label>
                <textarea name="feedback" class="form-input" rows="3" placeholder="Your feedback..."></textarea>
            </div>
            <button type="submit" class="btn-primary w-full">Submit Feedback</button>
        </form>
    </div>
</div>
{% endblock %}
