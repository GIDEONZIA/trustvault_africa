{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'maintenance:request_list' %}" class="text-primary-600">← Back to Requests</a>
        <h1 class="text-2xl font-bold mt-2">Report an Issue</h1>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-md border">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="mt-8 w-full bg-primary-600 text-white py-3 rounded-lg font-bold hover:bg-primary-700 transition">
                Submit Request
            </button>
        </form>
    </div>
</div>
{% endblock %}
