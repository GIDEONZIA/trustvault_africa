{% extends "base.html" %}
{% block title %}Update Request - RentFlow{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Update Maintenance Request</h1>
    <p class="text-gray-500 mb-6">{{ maintenance_request.request_number }} - {{ maintenance_request.title }}</p>
    <div class="card">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn-primary">Update</button>
        </form>
    </div>
</div>
{% endblock %}
