{% extends "base.html" %}
{% load humanize %}
{% block title %}Pay Invoice - RentFlow{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Pay via M-Pesa</h1>
    <div class="card">
        <div class="mb-6 p-4 bg-blue-50 rounded-lg">
            <p class="text-sm text-blue-800"><strong>Invoice:</strong> {{ invoice.invoice_number }}</p>
            <p class="text-sm text-blue-800"><strong>Amount:</strong> KES {{ invoice.balance|floatformat:0|intcomma }}</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">M-Pesa Phone Number</label>
                <input type="text" name="phone_number" class="form-input" placeholder="254712345678" required>
                <p class="mt-1 text-xs text-gray-500">Format: 254XXXXXXXXX</p>
            </div>
            <button type="submit" class="btn-success w-full"><i class="fas fa-mobile-alt mr-2"></i>Send STK Push</button>
        </form>
    </div>
</div>
{% endblock %}
