{% if page_obj.has_other_pages %}
<div class="flex justify-center items-center gap-2 mt-8">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Previous</a>
    {% endif %}
    <span class="px-4 py-2 bg-haven-dark text-white rounded-lg">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Next</a>
    {% endif %}
</div>
{% endif %}
