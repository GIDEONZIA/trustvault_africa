{% if messages %}
<div class="fixed top-20 right-4 z-50 space-y-2" id="messages">
    {% for message in messages %}
    <div class="px-6 py-4 rounded-lg shadow-lg {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200{% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-200{% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
<script>
    setTimeout(() => {
        const msgDiv = document.getElementById('messages');
        if (msgDiv) msgDiv.style.display = 'none';
    }, 5000);
</script>
{% endif %}
