{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <h1 class="text-2xl font-bold mb-6">Create New Lease Agreement</h1>
    <div class="bg-white p-8 rounded-xl shadow border">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="mt-8 w-full bg-primary-600 text-white py-3 rounded-lg font-bold">Initialize Lease</button>
        </form>
    </div>
</div>
{% endblock %}
