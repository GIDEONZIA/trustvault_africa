{% extends "base.html" %}
{% block title %}Terminate Lease - RentFlow{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="card">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Terminate Lease</h2>
        <p class="text-gray-600 mb-4">Terminate lease <strong>{{ lease.lease_number }}</strong> for {{ lease.tenant.full_name }}?</p>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
                <textarea name="reason" class="form-input" rows="3" placeholder="Reason for termination..."></textarea>
            </div>
            <div class="flex space-x-3">
                <button type="submit" class="btn-danger">Terminate</button>
                <a href="{% url 'tenants:lease-detail' lease.pk %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
