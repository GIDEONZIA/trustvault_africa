{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto py-8">
    <div class="flex justify-between items-center border-b pb-4 mb-8">
        <h1 class="text-3xl font-bold">Lease Detail</h1>
        <span class="px-4 py-1 bg-green-100 text-green-800 rounded-full font-bold uppercase text-sm">{{ lease.status }}</span>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold text-gray-400 text-xs uppercase mb-4">Financials</h3>
                <div class="flex justify-between mb-2"><span>Monthly Rent</span><span class="font-bold">KES {{ lease.monthly_rent }}</span></div>
                <div class="flex justify-between"><span>Security Deposit</span><span class="font-bold">KES {{ lease.deposit_amount }}</span></div>
            </div>
        </div>
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold text-gray-400 text-xs uppercase mb-4">Duration</h3>
                <p>Start Date: <strong>{{ lease.start_date }}</strong></p>
                <p>End Date: <strong>{{ lease.end_date }}</strong></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
