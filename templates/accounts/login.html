{% extends "base.html" %}
{% block title %}Login - Zia Property Ltd{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-10 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-primary-600">Zia Property Portal</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-primary-500 text-white py-2 rounded-md hover:bg-primary-600 transition">Login</button>
    </form>
    <div class="mt-4 text-center">
        <a href="{% url 'accounts:register' %}" class="text-sm text-gray-600 hover:underline">Don't have an account? Register</a>
    </div>
</div>
{% endblock %}
