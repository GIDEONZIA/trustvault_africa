{% extends "base.html" %}
{% block title %}Reset Password - Zia Property Ltd{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-10 bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Reset Password</h2>
    <p class="text-sm text-gray-600 mb-6 text-center">Enter your email to receive a reset link.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-primary-500 text-white py-2 rounded-md hover:bg-primary-600 transition">Send Reset Link</button>
    </form>
</div>
{% endblock %}
